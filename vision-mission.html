<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vision & Mission | Nirmala M Halmandge Degree College Bhalki</title>
<meta name="description" content="Discover the vision, mission, and core values of Nirmala M Halmandge Degree College, Bhalki." />
<link rel="icon" href="./images/logo.webp" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="tailwind.config.snippet.js"></script>
<link rel="stylesheet" href="style.css" />
</head>
<body class="antialiased">

<div id="site-header"></div>

<main>

  <section class="relative bg-ink py-16 sm:py-20 overflow-hidden">
    <div class="absolute inset-0 opacity-25">
      <img src="https://picsum.photos/seed/nmh-vision-bg/1600/500" alt="" class="w-full h-full object-cover" />
    </div>
    <div class="absolute inset-0 bg-gradient-to-r from-ink via-ink/85 to-ink/60"></div>
    <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <span class="seal-badge text-marigold border-marigold text-xs uppercase tracking-wider">Guiding Principles</span>
      <h1 id="ph-heading" class="font-display text-3xl sm:text-4xl lg:text-5xl font-bold text-cream mt-5"></h1>
      <div class="flex items-center gap-2 text-cream/60 text-sm mt-4">
        <a href="index.html" class="hover:text-marigold transition-colors">Home</a>
        <span>/</span>
        <span id="ph-breadcrumb" class="text-marigold"></span>
      </div>
    </div>
  </section>

  <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 sm:py-24">
    <div class="grid lg:grid-cols-2 gap-12 lg:gap-16 items-center">
      <div class="reveal order-2 lg:order-1 space-y-10">
        <div>
          <div class="hairline-ornament mb-5">
            <span class="font-display text-2xl font-bold text-maroon whitespace-nowrap" id="vision-heading"></span>
          </div>
          <p id="vision-text" class="text-ink/75 leading-relaxed"></p>
        </div>
        <div>
          <div class="hairline-ornament mb-5">
            <span class="font-display text-2xl font-bold text-maroon whitespace-nowrap" id="mission-heading"></span>
          </div>
          <ul id="mission-points" class="space-y-3 text-ink/75 leading-relaxed"></ul>
        </div>
      </div>
      <div class="reveal order-1 lg:order-2">
        <div class="rounded-2xl overflow-hidden shadow-xl">
          <img id="vm-img" src="" alt="Vision and mission" class="w-full h-full object-cover" />
        </div>
      </div>
    </div>

    <div class="mt-20">
      <div class="text-center max-w-xl mx-auto reveal">
        <span class="seal-badge text-maroon text-xs uppercase tracking-wider font-medium">What We Stand For</span>
        <h2 class="font-display text-3xl font-bold text-ink mt-5">Our Core Values</h2>
      </div>
      <div id="values-grid" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6 mt-12"></div>
    </div>
  </section>

</main>

<div id="site-footer"></div>

<script src="content.js"></script>
<script src="main.js"></script>
<script>
  const D = window.SITE.visionMission;
  document.getElementById('ph-heading').textContent = D.pageTitle;
  document.getElementById('ph-breadcrumb').textContent = D.breadcrumb;
  document.getElementById('vm-img').src = D.image;

  document.getElementById('vision-heading').textContent = D.vision.heading;
  document.getElementById('vision-text').textContent = D.vision.text;

  document.getElementById('mission-heading').textContent = D.mission.heading;
  document.getElementById('mission-points').innerHTML = D.mission.points.map(p => `
    <li class="flex items-start gap-3">
      <svg class="w-5 h-5 text-marigold shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
      <span>${p}</span>
    </li>
  `).join('');

  document.getElementById('values-grid').innerHTML = D.values.map(v => `
    <div class="lift-card bg-white rounded-2xl border border-sand p-6 text-center">
      <h3 class="font-display font-semibold text-ink mb-2">${v.title}</h3>
      <p class="text-sm text-ink/65 leading-relaxed">${v.text}</p>
    </div>
  `).join('');
</script>
</body>
</html>
