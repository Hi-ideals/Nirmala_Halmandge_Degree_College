<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bachelor of Science (B.Sc.) | Nirmala M Halmandge Degree College Bhalki</title>
<meta name="description" content="Explore the Bachelor of Science (B.Sc.) program offered at Nirmala M Halmandge Degree College, Bhalki." />
<link rel="icon" href="./images/logo.webp" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="tailwind.config.snippet.js"></script>
<link rel="stylesheet" href="style.css" />
</head>
<body class="antialiased">

<div id="site-header"></div>

<main>

  <section class="relative bg-ink py-16 sm:py-20 overflow-hidden">
    <div class="absolute inset-0 opacity-25">
      <img id="ph-img" src="" alt="" class="w-full h-full object-cover" />
    </div>
    <div class="absolute inset-0 bg-gradient-to-r from-ink via-ink/85 to-ink/60"></div>
    <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <span class="seal-badge text-marigold border-marigold text-xs uppercase tracking-wider">Courses Offered</span>
      <h1 id="ph-heading" class="font-display text-3xl sm:text-4xl lg:text-5xl font-bold text-cream mt-5"></h1>
      <div class="flex items-center gap-2 text-cream/60 text-sm mt-4">
        <a href="index.html" class="hover:text-marigold transition-colors">Home</a>
        <span>/</span>
        <span id="ph-breadcrumb" class="text-marigold"></span>
      </div>
    </div>
  </section>

  <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 sm:py-24">
    <div class="grid lg:grid-cols-2 gap-12 lg:gap-16 items-start">
      <div class="reveal">
        <div class="rounded-2xl overflow-hidden shadow-xl">
          <img id="course-img" src="" alt="B.Com classroom" class="w-full h-full object-cover" />
        </div>
        <div class="grid grid-cols-2 gap-4 mt-6">
          <div class="bg-white border border-sand rounded-xl p-5">
            <p class="text-xs uppercase tracking-wide text-ink/50 mb-1">Duration</p>
            <p id="course-duration" class="font-display font-semibold text-maroon"></p>
          </div>
          <div class="bg-white border border-sand rounded-xl p-5">
            <p class="text-xs uppercase tracking-wide text-ink/50 mb-1">Eligibility</p>
            <p id="course-eligibility" class="font-semibold text-ink text-sm"></p>
          </div>
        </div>
      </div>
      <div class="reveal">
        <h2 class="font-display text-2xl font-bold text-ink mb-4">Program Overview</h2>
        <p id="course-overview" class="text-ink/75 leading-relaxed"></p>

        <h3 class="font-display text-xl font-semibold text-ink mt-8 mb-4">Program Highlights</h3>
        <ul id="course-highlights" class="space-y-3"></ul>
      </div>
    </div>

    <div class="grid sm:grid-cols-2 gap-10 mt-16">
      <div class="reveal bg-sand/50 rounded-2xl p-8">
        <h3 class="font-display text-xl font-semibold text-ink mb-5">Core Subjects</h3>
        <div id="course-subjects" class="flex flex-wrap gap-2"></div>
      </div>
      <div class="reveal bg-forest rounded-2xl p-8 text-cream">
        <h3 class="font-display text-xl font-semibold mb-5">Career Pathways</h3>
        <ul id="course-careers" class="space-y-2.5 text-sm"></ul>
      </div>
    </div>
  </section>

  <section class="bg-marigold">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex flex-col sm:flex-row items-center justify-between gap-6">
      <div>
        <h3 class="font-display text-2xl font-bold text-ink">Interested in our B.Com program too?</h3>
        <p class="text-ink/70 mt-1">Build a strong foundation in accounting, finance, and business management.</p>
      </div>
      <a href="bechelorof-commerese.html" class="inline-flex items-center bg-ink text-cream px-7 py-3.5 rounded-full font-semibold hover:bg-maroon transition-colors shrink-0">
        View B.Com Program
      </a>
    </div>
  </section>

</main>

<div id="site-footer"></div>

<script src="content.js"></script>
<script src="main.js"></script>
<script>
  const D = window.SITE.bsc;
  document.getElementById('ph-img').src = D.image;
  document.getElementById('ph-heading').textContent = D.pageTitle;
  document.getElementById('ph-breadcrumb').textContent = D.breadcrumb;
  document.getElementById('course-img').src = D.image;
  document.getElementById('course-duration').textContent = D.duration;
  document.getElementById('course-eligibility').textContent = D.eligibility;
  document.getElementById('course-overview').textContent = D.overview;

  document.getElementById('course-highlights').innerHTML = D.highlights.map(h => `
    <li class="flex items-start gap-3">
      <svg class="w-5 h-5 text-maroon shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
      <span class="text-ink/75 text-[15px] leading-relaxed">${h}</span>
    </li>
  `).join('');

  document.getElementById('course-subjects').innerHTML = D.subjects.map(s => `
    <span class="bg-white border border-maroon/20 text-maroon text-sm px-4 py-1.5 rounded-full">${s}</span>
  `).join('');

  document.getElementById('course-careers').innerHTML = D.careers.map(c => `
    <li class="flex items-center gap-2.5">
      <svg class="w-4 h-4 text-marigold shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      ${c}
    </li>
  `).join('');
</script>
</body>
</html>
