<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>About College | Nirmala M Halmandge Degree College Bhalki</title>
<meta name="description" content="Learn about Nirmala M Halmandge Degree College, Bhalki — a grant-in-aid institution serving rural students across Bidar district, Karnataka." />
<link rel="icon" href="./images/logo.webp" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="tailwind.config.snippet.js"></script>
<link rel="stylesheet" href="style.css" />
</head>
<body class="antialiased">

<div id="site-header"></div>

<main>

  <!-- Page header -->
  <section class="relative bg-ink py-16 sm:py-20 overflow-hidden">
    <div class="absolute inset-0 opacity-25">
      <img id="ph-img" src="" alt="" class="w-full h-full object-cover" />
    </div>
    <div class="absolute inset-0 bg-gradient-to-r from-ink via-ink/85 to-ink/60"></div>
    <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <span id="ph-eyebrow" class="seal-badge text-marigold border-marigold text-xs uppercase tracking-wider"></span>
      <h1 id="ph-heading" class="font-display text-3xl sm:text-4xl lg:text-5xl font-bold text-cream mt-5"></h1>
      <div class="flex items-center gap-2 text-cream/60 text-sm mt-4">
        <a href="index.html" class="hover:text-marigold transition-colors">Home</a>
        <span>/</span>
        <span id="ph-breadcrumb" class="text-marigold"></span>
      </div>
    </div>
  </section>

  <!-- Content -->
  <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 sm:py-24">
    <div class="grid lg:grid-cols-2 gap-12 lg:gap-16 items-start">
      <div class="reveal">
        <div id="about-paragraphs" class="space-y-5 text-ink/75 leading-relaxed text-[15px]"></div>
      </div>
      <div class="reveal space-y-6">
        <div class="rounded-2xl overflow-hidden shadow-xl">
         <img id="about-img" src="" alt="College campus" class="w-full h-64 object-cover" />
        </div>
        <div class="rounded-2xl overflow-hidden shadow-xl">
          <img id="about-img2" src="" alt="Students at college" class="w-full h-full object-cover" />
        </div>
      </div>
    </div>

    <div id="about-highlights" class="grid sm:grid-cols-3 gap-6 mt-16"></div>
  </section>

  <!-- CTA strip -->
  <section class="bg-marigold">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex flex-col sm:flex-row items-center justify-between gap-6">
      <div>
        <h3 class="font-display text-2xl font-bold text-ink">Want to know more about our programs?</h3>
        <p class="text-ink/70 mt-1">Explore our Commerce and Science degree offerings.</p>
      </div>
      <a href="bechelorof-commerese.html" class="inline-flex items-center bg-ink text-cream px-7 py-3.5 rounded-full font-semibold hover:bg-maroon transition-colors shrink-0">
        View Courses
      </a>
    </div>
  </section>

</main>

<div id="site-footer"></div>

<script src="content.js"></script>
<script src="main.js"></script>
<script>
  const D = window.SITE.about;
  document.getElementById('ph-img').src = D.image;
  document.getElementById('ph-eyebrow').textContent = D.eyebrow;
  document.getElementById('ph-heading').textContent = D.pageTitle;
  document.getElementById('ph-breadcrumb').textContent = D.breadcrumb;

  document.getElementById('about-paragraphs').innerHTML = `<h2 class="font-display text-2xl font-bold text-ink mb-4">${D.heading}</h2>` + D.paragraphs.map(p => `<p>${p}</p>`).join('');
  document.getElementById('about-img').src = D.image;
  document.getElementById('about-img2').src = D.secondaryImage;

  document.getElementById('about-highlights').innerHTML = D.highlights.map(h => `
    <div class="lift-card bg-white rounded-2xl border border-sand p-7 text-center">
      <div class="w-3 h-3 rounded-full bg-marigold mx-auto mb-4"></div>
      <h3 class="font-display font-semibold text-ink text-lg mb-2">${h.title}</h3>
      <p class="text-sm text-ink/65 leading-relaxed">${h.text}</p>
    </div>
  `).join('');
</script>
</body>
</html>
