<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Principal's Message | Nirmala M Halmandge Degree College Bhalki</title>
<meta name="description" content="Read the Principal's message from Nirmala M Halmandge Degree College, Bhalki." />
<link rel="icon" href="./images/logo.webp" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="tailwind.config.snippet.js"></script>
<link rel="stylesheet" href="style.css" />
</head>
<body class="antialiased">

<div id="site-header"></div>

<main>

  <section class="relative bg-ink py-16 sm:py-20 overflow-hidden">
    <div class="absolute inset-0 opacity-25">
      <img id="ph-img" src="./images/men-avatar.webp" alt="" class="w-full h-full object-cover" />
    </div>
    <div class="absolute inset-0 bg-gradient-to-r from-ink via-ink/85 to-ink/60"></div>
    <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <span class="seal-badge text-marigold border-marigold text-xs uppercase tracking-wider">From the Desk of the Principal</span>
      <h1 id="ph-heading" class="font-display text-3xl sm:text-4xl lg:text-5xl font-bold text-cream mt-5"></h1>
      <div class="flex items-center gap-2 text-cream/60 text-sm mt-4">
        <a href="index.html" class="hover:text-marigold transition-colors">Home</a>
        <span>/</span>
        <span id="ph-breadcrumb" class="text-marigold"></span>
      </div>
    </div>
  </section>

  <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 sm:py-24">
    <div class="grid lg:grid-cols-[380px_1fr] gap-12 lg:gap-16">
      <div class="reveal">
        <div class="rounded-2xl overflow-hidden shadow-xl sticky top-28">
          <img id="principal-img" src="" alt="Principal portrait" class="w-full h-full object-cover" />
          <div class="bg-maroon text-cream p-5">
            <p class="font-display font-semibold text-lg" id="principal-name"></p>
            <p class="text-cream/75 text-sm mt-0.5" id="principal-role"></p>
          </div>
        </div>
      </div>
      <div class="reveal">
        <svg class="w-12 h-12 text-marigold/40 mb-4" viewBox="0 0 24 24" fill="currentColor"><path d="M9 17H6.5c-1 0-1.5-.5-1.5-1.5V13c0-3.5 2-6 5-7l.5 1.5c-2 .8-3 2.3-3 4.5h2c1.1 0 2 .9 2 2v2c0 1.1-.9 2-2 2zm9 0h-2.5c-1 0-1.5-.5-1.5-1.5V13c0-3.5 2-6 5-7l.5 1.5c-2 .8-3 2.3-3 4.5h2c1.1 0 2 .9 2 2v2c0 1.1-.9 2-2 2z"/></svg>
        <div id="principal-paragraphs" class="space-y-5 text-ink/75 leading-relaxed text-[15px]"></div>
        <p id="principal-signoff" class="mt-7 font-display italic text-maroon text-xl border-l-4 border-marigold pl-5"></p>
      </div>
    </div>
  </section>

  <section class="bg-marigold">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex flex-col sm:flex-row items-center justify-between gap-6">
      <div>
        <h3 class="font-display text-2xl font-bold text-ink">Get to know our institution further</h3>
        <p class="text-ink/70 mt-1">Read about our vision, mission, and the college as a whole.</p>
      </div>
      <a href="vision-mission.html" class="inline-flex items-center bg-ink text-cream px-7 py-3.5 rounded-full font-semibold hover:bg-maroon transition-colors shrink-0">
        Vision & Mission
      </a>
    </div>
  </section>

</main>

<div id="site-footer"></div>

<script src="content.js"></script>
<script src="main.js"></script>
<script>
  const D = window.SITE.principal;
  document.getElementById('ph-heading').textContent = D.pageTitle;
  document.getElementById('ph-breadcrumb').textContent = D.breadcrumb;
  document.getElementById('principal-img').src = D.image;
  document.getElementById('principal-name').textContent = D.name;
  document.getElementById('principal-role').textContent = D.role;
  document.getElementById('principal-paragraphs').innerHTML = D.paragraphs.map(p => `<p>${p}</p>`).join('');
  document.getElementById('principal-signoff').textContent = `“${D.signoff}”`;
</script>
</body>
</html>
