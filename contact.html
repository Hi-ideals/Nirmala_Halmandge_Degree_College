<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact Us | Nirmala M Halmandge Degree College Bhalki</title>
<meta name="description" content="Get in touch with Nirmala M Halmandge Degree College, Bhalki — address, phone, email, and location map." />
<link rel="icon" href="./images/logo.webp" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="tailwind.config.snippet.js"></script>
<link rel="stylesheet" href="style.css" />
</head>
<body class="antialiased">

<div id="site-header"></div>

<main>

  <section class="relative bg-ink py-16 sm:py-20 overflow-hidden">
    <div class="absolute inset-0 opacity-25">
      <img id="ph-img" src="" alt="" class="w-full h-full object-cover" />
    </div>
    <div class="absolute inset-0 bg-gradient-to-r from-ink via-ink/85 to-ink/60"></div>
    <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <span class="seal-badge text-marigold border-marigold text-xs uppercase tracking-wider">We'd love to hear from you</span>
      <h1 id="ph-heading" class="font-display text-3xl sm:text-4xl lg:text-5xl font-bold text-cream mt-5"></h1>
      <div class="flex items-center gap-2 text-cream/60 text-sm mt-4">
        <a href="index.html" class="hover:text-marigold transition-colors">Home</a>
        <span>/</span>
        <span id="ph-breadcrumb" class="text-marigold"></span>
      </div>
    </div>
  </section>

  <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 sm:py-24">
    <p id="contact-intro" class="text-ink/70 leading-relaxed max-w-2xl reveal"></p>

    <div class="grid lg:grid-cols-5 gap-10 mt-12">

      <!-- Contact info cards -->
      <div class="lg:col-span-2 space-y-5 reveal">
        <div class="bg-white border border-sand rounded-2xl p-6 flex items-start gap-4">
          <div class="w-12 h-12 rounded-xl bg-maroon/10 text-maroon flex items-center justify-center shrink-0">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <div>
            <h3 class="font-display font-semibold text-ink mb-1">Address</h3>
            <p id="contact-address" class="text-sm text-ink/70 leading-relaxed"></p>
          </div>
        </div>

        <div class="bg-white border border-sand rounded-2xl p-6 flex items-start gap-4">
          <div class="w-12 h-12 rounded-xl bg-maroon/10 text-maroon flex items-center justify-center shrink-0">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </div>
          <div>
            <h3 class="font-display font-semibold text-ink mb-1">Phone</h3>
            <a id="contact-phone" href="#" class="text-sm text-ink/70 hover:text-maroon transition-colors"></a>
          </div>
        </div>

        <div class="bg-white border border-sand rounded-2xl p-6 flex items-start gap-4">
          <div class="w-12 h-12 rounded-xl bg-maroon/10 text-maroon flex items-center justify-center shrink-0">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4V4z"/><path d="M22 6l-10 7L2 6"/></svg>
          </div>
          <div>
            <h3 class="font-display font-semibold text-ink mb-1">Email</h3>
            <a id="contact-email" href="#" class="text-sm text-ink/70 hover:text-maroon transition-colors break-all"></a>
          </div>
        </div>

        <div class="bg-white border border-sand rounded-2xl p-6 flex items-start gap-4">
          <div class="w-12 h-12 rounded-xl bg-maroon/10 text-maroon flex items-center justify-center shrink-0">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          </div>
          <div>
            <h3 class="font-display font-semibold text-ink mb-1">Office Hours</h3>
            <p id="contact-hours" class="text-sm text-ink/70"></p>
          </div>
        </div>
      </div>

      <!-- Contact form (static, no backend) -->
      <div class="lg:col-span-3 reveal">
        <div class="bg-white border border-sand rounded-2xl p-7 sm:p-9">
          <h2 class="font-display text-2xl font-bold text-ink mb-1">Send us a message</h2>
          <p class="text-sm text-ink/55 mb-7">Fill the form below and our office will get back to you.</p>

          <form id="contactForm" class="space-y-5">
            <div class="grid sm:grid-cols-2 gap-5">
              <div>
                <label for="fullName" class="block text-sm font-medium text-ink mb-1.5">Full Name</label>
                <input type="text" id="fullName" name="fullName" required placeholder="Your full name"
                  class="field-input w-full border border-sand rounded-lg px-4 py-2.5 text-sm bg-cream/40 transition-shadow" />
              </div>
              <div>
                <label for="phoneNumber" class="block text-sm font-medium text-ink mb-1.5">Phone Number</label>
                <input type="tel" id="phoneNumber" name="phoneNumber" required placeholder="10-digit mobile number"
                  class="field-input w-full border border-sand rounded-lg px-4 py-2.5 text-sm bg-cream/40 transition-shadow" />
              </div>
            </div>

            <div>
              <label for="emailAddress" class="block text-sm font-medium text-ink mb-1.5">Email Address</label>
              <input type="email" id="emailAddress" name="emailAddress" required placeholder="you@example.com"
                class="field-input w-full border border-sand rounded-lg px-4 py-2.5 text-sm bg-cream/40 transition-shadow" />
            </div>

            <div>
              <label for="subject" class="block text-sm font-medium text-ink mb-1.5">Subject</label>
              <select id="subject" name="subject" class="field-input w-full border border-sand rounded-lg px-4 py-2.5 text-sm bg-cream/40 transition-shadow">
                <option>Admissions Enquiry</option>
                <option>Course Information</option>
                <option>Fee Structure</option>
                <option>General Enquiry</option>
                <option>Other</option>
              </select>
            </div>

            <div>
              <label for="message" class="block text-sm font-medium text-ink mb-1.5">Message</label>
              <textarea id="message" name="message" rows="5" required placeholder="Write your message here..."
                class="field-input w-full border border-sand rounded-lg px-4 py-2.5 text-sm bg-cream/40 transition-shadow resize-none"></textarea>
            </div>

            <button type="submit" class="w-full sm:w-auto inline-flex items-center justify-center bg-maroon text-cream px-8 py-3 rounded-full font-semibold hover:bg-maroon-dark transition-colors">
              Send Message
            </button>

            <p id="formSuccess" class="hidden text-sm text-forest bg-forest/10 border border-forest/20 rounded-lg px-4 py-3">
              Thank you — your message has been noted. Our office will reach out to you shortly.
            </p>
          </form>
        </div>
      </div>
    </div>

    <!-- Map -->
    <div class="mt-16 reveal">
      <h2 class="font-display text-2xl font-bold text-ink mb-5">Find Us on the Map</h2>
      <div class="rounded-2xl overflow-hidden shadow-xl border border-sand">
        <iframe id="contact-map" src="" width="100%" height="420" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="College location map"></iframe>
      </div>
    </div>
  </section>

</main>

<div id="site-footer"></div>

<script src="content.js"></script>
<script src="main.js"></script>
<script>
  const D = window.SITE.contact;
  const M = window.SITE.meta;

  document.getElementById('ph-img').src = D.image;
  document.getElementById('ph-heading').textContent = D.pageTitle;
  document.getElementById('ph-breadcrumb').textContent = D.breadcrumb;
  document.getElementById('contact-intro').textContent = D.intro;

  document.getElementById('contact-address').textContent = `${M.addressLine1}, ${M.addressLine2}`;
  const phoneEl = document.getElementById('contact-phone');
  phoneEl.textContent = M.phoneDisplay;
  phoneEl.href = `tel:${M.phone.replace(/\s/g, '')}`;
  const emailEl = document.getElementById('contact-email');
  emailEl.textContent = M.email;
  emailEl.href = `mailto:${M.email}`;
  document.getElementById('contact-hours').textContent = D.officeHours;
  document.getElementById('contact-map').src = M.mapEmbedUrl;

  // Static form — no backend, just a friendly confirmation
  const form = document.getElementById('contactForm');
  const successMsg = document.getElementById('formSuccess');
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    successMsg.classList.remove('hidden');
    form.reset();
    successMsg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
</script>
</body>
</html>
