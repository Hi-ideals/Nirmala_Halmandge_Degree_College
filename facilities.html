<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Facilities | Nirmala M Halmandge Degree College Bhalki</title>
<meta name="description" content="Explore the campus facilities at Nirmala M Halmandge Degree College, Bhalki — library, laboratories, computer lab, sports, and more." />
<link rel="icon" href="./images/logo.webp" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="tailwind.config.snippet.js"></script>
<link rel="stylesheet" href="style.css" />
</head>
<body class="antialiased">

<div id="site-header"></div>

<main>

  <section class="relative bg-ink py-16 sm:py-20 overflow-hidden">
    <div class="absolute inset-0 opacity-25">
      <img src="https://picsum.photos/seed/nmh-facilities-bg/1600/500" alt="" class="w-full h-full object-cover" />
    </div>
    <div class="absolute inset-0 bg-gradient-to-r from-ink via-ink/85 to-ink/60"></div>
    <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <span class="seal-badge text-marigold border-marigold text-xs uppercase tracking-wider">Campus Life</span>
      <h1 id="ph-heading" class="font-display text-3xl sm:text-4xl lg:text-5xl font-bold text-cream mt-5"></h1>
      <div class="flex items-center gap-2 text-cream/60 text-sm mt-4">
        <a href="index.html" class="hover:text-marigold transition-colors">Home</a>
        <span>/</span>
        <span id="ph-breadcrumb" class="text-marigold"></span>
      </div>
    </div>
  </section>

  <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 sm:py-24">
    <p id="facilities-intro" class="text-ink/70 leading-relaxed max-w-2xl reveal"></p>
    <div id="facilities-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-7 mt-12"></div>
  </section>

  <section class="bg-marigold">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex flex-col sm:flex-row items-center justify-between gap-6">
      <div>
        <h3 class="font-display text-2xl font-bold text-ink">Want to see the campus for yourself?</h3>
        <p class="text-ink/70 mt-1">Browse photos from campus life in our gallery.</p>
      </div>
      <a href="gallery.html" class="inline-flex items-center bg-ink text-cream px-7 py-3.5 rounded-full font-semibold hover:bg-maroon transition-colors shrink-0">
        View Gallery
      </a>
    </div>
  </section>

</main>

<div id="site-footer"></div>

<script src="content.js"></script>
<script src="main.js"></script>
<script>
  const D = window.SITE.facilities;
  document.getElementById('ph-heading').textContent = D.pageTitle;
  document.getElementById('ph-breadcrumb').textContent = D.breadcrumb;
  document.getElementById('facilities-intro').textContent = D.intro;

  document.getElementById('facilities-grid').innerHTML = D.list.map(f => `
    <div class="lift-card bg-white rounded-2xl overflow-hidden border border-sand">
      <div class="h-52 overflow-hidden">
        <img src="${f.image}" alt="${f.title}" class="w-full h-full object-cover" />
      </div>
      <div class="p-6">
        <h3 class="font-display font-semibold text-ink text-lg mb-2">${f.title}</h3>
        <p class="text-sm text-ink/65 leading-relaxed">${f.text}</p>
      </div>
    </div>
  `).join('');
</script>
</body>
</html>
