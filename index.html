<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nirmala M Halmandge Degree College Bhalki | Home</title>
<meta name="description" content="Nirmala M Halmandge Degree College, Bhalki, Bidar — a grant-in-aid institution offering B.Com and B.Sc degree programs to students across rural Bidar district, Karnataka." />
<link rel="icon" href="./images/logo.webp" />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="tailwind.config.snippet.js"></script>

<link rel="stylesheet" href="style.css" />
</head>
<body class="antialiased">

<div id="site-header"></div>

<main>

  <!-- ============ HERO ============ -->
  <section class="relative bg-ink overflow-hidden">
    <div class="absolute inset-0">
      <img id="hero-img" src="" alt="NMH Degree College campus" class="w-full h-full object-cover " />
      <div class="absolute inset-0 bg-gradient-to-t from-ink via-ink/60 to-ink/30"></div>
    </div>
    <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-20 pb-28 sm:pt-28 sm:pb-36">
      <div class="max-w-2xl">
        <span id="hero-eyebrow" class="seal-badge text-white border-marigold text-xs uppercase tracking-wider"></span>
        <h1 id="hero-heading" class="font-display text-4xl sm:text-5xl lg:text-6xl font-bold text-cream mt-6 leading-tight"></h1>
        <p id="hero-sub" class="text-cream/75 text-base sm:text-lg mt-6 leading-relaxed max-w-xl"></p>
        <div class="flex flex-wrap gap-4 mt-9">
          <a id="hero-cta-primary" href="#" class="inline-flex items-center bg-marigold text-ink px-7 py-3.5 rounded-full font-semibold hover:bg-marigold-dark transition-colors"></a>
          <a id="hero-cta-secondary" href="#" class="inline-flex items-center border border-cream/40 text-cream px-7 py-3.5 rounded-full font-semibold hover:bg-cream/10 transition-colors"></a>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ HIGHLIGHT CARDS (overlapping hero) ============ -->
  <section class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 -mt-14 sm:-mt-16 z-10">
    <div id="highlight-cards" class="grid grid-cols-1 sm:grid-cols-3 gap-5"></div>
  </section>

  <!-- ============ WELCOME / ABOUT ============ -->
  <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 sm:py-28">
    <div class="grid lg:grid-cols-2 gap-12 lg:gap-16 items-center">
      <div class="reveal order-2 lg:order-1">
        <span class="seal-badge text-maroon text-xs uppercase tracking-wider font-medium" id="welcome-eyebrow"></span>
        <h2 id="welcome-heading" class="font-display text-3xl sm:text-4xl font-bold text-ink mt-5 leading-snug"></h2>
        <div id="welcome-paragraphs" class="mt-5 space-y-4 text-ink/75 leading-relaxed"></div>
      </div>
    <div class="reveal order-1 lg:order-2 relative mb-8 sm:mb-0">
  <div class="rounded-2xl overflow-hidden shadow-xl h-64 sm:h-80 md:h-96 lg:h-[26rem]">
    <img id="welcome-img" src="" alt="College building" class="w-full h-full object-cover" />
  </div>
  <div class="absolute -bottom-6 -left-6 bg-maroon text-cream rounded-xl px-6 py-5 shadow-lg hidden sm:block">
    <p class="font-display text-2xl font-bold">27+</p>
    <p class="text-xs uppercase tracking-wide text-cream/80">Villages Served</p>
  </div>
</div>
    </div>
  </section>

  <!-- ============ STATS STRIP ============ -->
  <!-- <section class="bg-forest">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
      <div id="stats-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-8 text-center"></div>
    </div>
  </section> -->

  <!-- ============ PRINCIPAL TEASER ============ -->
  <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 sm:py-28">
    <div class="grid lg:grid-cols-2 gap-12 lg:gap-16 items-center">
      <div class="reveal relative">
        <div class="rounded-2xl overflow-hidden shadow-xl max-w-md mx-auto">
          <img id="principal-img" src="" alt="Principal portrait" class="w-full h-full object-cover" />
        </div>
      </div>
      <div class="reveal">
        <span class="seal-badge text-maroon text-xs uppercase tracking-wider font-medium" id="principal-eyebrow"></span>
        <h2 id="principal-heading" class="font-display text-3xl sm:text-4xl font-bold text-ink mt-5 leading-snug"></h2>
        <div id="principal-paragraphs" class="mt-5 space-y-4 text-ink/75 leading-relaxed"></div>
        <p id="principal-signoff" class="mt-5 font-display italic text-maroon text-lg"></p>
        <a id="principal-cta" href="#" class="inline-flex items-center gap-2 mt-6 text-maroon font-semibold hover:gap-3 transition-all">
          <span></span>
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </a>
      </div>
    </div>
  </section>

  <!-- ============ ABOUT BANNER ============ -->
  <section class="bg-sand/60 pattern-dots">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 sm:py-28">
      <div class="grid lg:grid-cols-2 gap-12 lg:gap-16 items-center">
        <div class="reveal order-2 lg:order-1 relative">
          <div class="rounded-2xl overflow-hidden shadow-xl">
            <img id="banner-img" src="" alt="Students at NMH college" class="w-full h-full object-cover" />
          </div>
        </div>
        <div class="reveal order-1 lg:order-2">
          <h2 id="banner-heading" class="font-display text-3xl sm:text-4xl font-bold text-ink leading-snug"></h2>
          <div id="banner-paragraphs" class="mt-5 space-y-4 text-ink/75 leading-relaxed"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ COURSES ============ -->
  <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 sm:py-28">
    <div class="text-center max-w-xl mx-auto reveal">
      <span class="seal-badge text-maroon text-xs uppercase tracking-wider font-medium" id="courses-eyebrow"></span>
      <h2 id="courses-heading" class="font-display text-3xl sm:text-4xl font-bold text-ink mt-5"></h2>
      <p id="courses-sub" class="text-ink/65 mt-3"></p>
    </div>
    <div id="courses-grid" class="grid sm:grid-cols-2 gap-7 mt-12 max-w-3xl mx-auto"></div>
  </section>

  <!-- ============ FACILITIES PREVIEW ============ -->
  <section class="bg-ink">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 sm:py-28">
      <div class="text-center max-w-xl mx-auto reveal">
        <span class="seal-badge text-marigold border-marigold text-xs uppercase tracking-wider font-medium" id="facilities-eyebrow"></span>
        <h2 id="facilities-heading" class="font-display text-3xl sm:text-4xl font-bold text-cream mt-5"></h2>
        <p id="facilities-sub" class="text-cream/65 mt-3"></p>
      </div>
      <div id="facilities-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6 mt-12"></div>
      <div class="text-center mt-10">
        <a href="facilities.html" class="inline-flex items-center gap-2 text-marigold font-semibold hover:gap-3 transition-all">
          View all facilities
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </a>
      </div>
    </div>
  </section>

  <!-- ============ CTA STRIP ============ -->
  <section class="bg-marigold">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex flex-col sm:flex-row items-center justify-between gap-6">
      <div>
        <h3 class="font-display text-2xl font-bold text-ink">Ready to begin your journey with NMH?</h3>
        <p class="text-ink/70 mt-1">Admissions open for B.Com and B.Sc — academic year 2026–27.</p>
      </div>
      <a href="contact.html" class="inline-flex items-center bg-ink text-cream px-7 py-3.5 rounded-full font-semibold hover:bg-maroon transition-colors shrink-0">
        Contact Admissions
      </a>
    </div>
  </section>

</main>

<div id="site-footer"></div>

<script src="content.js"></script>
<script src="main.js"></script>
<script>
  const D = window.SITE.home;

  // Hero
  document.getElementById('hero-img').src = D.hero.image;
  document.getElementById('hero-eyebrow').textContent = D.hero.eyebrow;
  document.getElementById('hero-heading').textContent = D.hero.heading;
  document.getElementById('hero-sub').textContent = D.hero.sub;
  const ctaP = document.getElementById('hero-cta-primary');
  ctaP.textContent = D.hero.ctaPrimary.label;
  ctaP.href = D.hero.ctaPrimary.href;
  const ctaS = document.getElementById('hero-cta-secondary');
  ctaS.textContent = D.hero.ctaSecondary.label;
  ctaS.href = D.hero.ctaSecondary.href;

  // Highlight cards
  document.getElementById('highlight-cards').innerHTML = D.highlightCards.map(c => `
    <div class="lift-card bg-white rounded-2xl shadow-lg p-7 border border-sand">
      <div class="w-14 h-14 rounded-xl bg-maroon/10 text-maroon flex items-center justify-center mb-4">
        ${window.SITE_ICONS[c.icon] || ''}
      </div>
      <h3 class="font-display text-lg font-semibold text-ink mb-2">${c.title}</h3>
      <p class="text-sm text-ink/65 leading-relaxed">${c.text}</p>
    </div>
  `).join('');

  // Welcome
  document.getElementById('welcome-eyebrow').textContent = D.welcome.eyebrow;
  document.getElementById('welcome-heading').textContent = D.welcome.heading;
  document.getElementById('welcome-paragraphs').innerHTML = D.welcome.paragraphs.map(p => `<p>${p}</p>`).join('');
  document.getElementById('welcome-img').src = D.welcome.image;

  // Stats
  // document.getElementById('stats-grid').innerHTML = D.stats.map(s => `
  //   <div>
  //     <p class="font-display text-3xl sm:text-4xl font-bold text-marigold">${s.value}</p>
  //     <p class="text-cream/70 text-sm mt-1 uppercase tracking-wide">${s.label}</p>
  //   </div>
  // `).join('');

  // Principal
  document.getElementById('principal-eyebrow').textContent = D.principalTeaser.eyebrow;
  document.getElementById('principal-heading').textContent = D.principalTeaser.heading;
  document.getElementById('principal-paragraphs').innerHTML = D.principalTeaser.paragraphs.map(p => `<p>${p}</p>`).join('');
  document.getElementById('principal-signoff').textContent = `— ${D.principalTeaser.signoff}`;
  document.getElementById('principal-img').src = D.principalTeaser.image;
  const pCta = document.getElementById('principal-cta');
  pCta.href = D.principalTeaser.cta.href;
  pCta.querySelector('span').textContent = D.principalTeaser.cta.label;

  // About banner
  document.getElementById('banner-heading').textContent = D.aboutBanner.heading;
  document.getElementById('banner-paragraphs').innerHTML = D.aboutBanner.paragraphs.map(p => `<p>${p}</p>`).join('');
  document.getElementById('banner-img').src = D.aboutBanner.image;

  // Courses
  document.getElementById('courses-eyebrow').textContent = D.coursesSection.eyebrow;
  document.getElementById('courses-heading').textContent = D.coursesSection.heading;
  document.getElementById('courses-sub').textContent = D.coursesSection.sub;
  document.getElementById('courses-grid').innerHTML = window.SITE.courses.map(c => `
    <a href="${c.href}" class="group lift-card block bg-white rounded-2xl overflow-hidden shadow-lg border border-sand">
      <div class="h-48 overflow-hidden">
        <img src="${c.image}" alt="${c.title}" class="img-zoom w-full h-full object-cover" />
      </div>
      <div class="p-6">
        <h3 class="font-display text-lg font-semibold text-ink mb-2">${c.title}</h3>
        <p class="text-sm text-ink/65">${c.short}</p>
        <span class="inline-flex items-center gap-1.5 text-maroon text-sm font-semibold mt-4">
          Learn more
          <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </span>
      </div>
    </a>
  `).join('');

  // Facilities preview
  document.getElementById('facilities-eyebrow').textContent = D.facilitiesSection.eyebrow;
  document.getElementById('facilities-heading').textContent = D.facilitiesSection.heading;
  document.getElementById('facilities-sub').textContent = D.facilitiesSection.sub;
  document.getElementById('facilities-grid').innerHTML = window.SITE.facilities.list.map(f => `
    <a href="facilities.html" class="group lift-card block rounded-2xl overflow-hidden relative h-56">
      <img src="${f.image}" alt="${f.title}" class="img-zoom absolute inset-0 w-full h-full object-cover" />
      <div class="absolute inset-0 bg-gradient-to-t from-ink via-ink/30 to-transparent"></div>
      <div class="absolute bottom-0 left-0 p-5">
        <h3 class="font-display text-cream font-semibold text-lg">${f.title}</h3>
      </div>
    </a>
  `).join('');
</script>
</body>
</html>
